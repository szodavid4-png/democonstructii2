<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Apex Roof</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">APEX</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>
  <button class="cta">GET QUOTE</button>
</header>

<section class="contact-hero">
  <div class="overlay"></div>

  <div class="contact-container">
    
    <div class="left">
      <h1>Contact Us</h1>
      <p>
        Get in touch with our team for a free quote or consultation.
        We respond fast and deliver premium roofing solutions.
      </p>

      <div class="info">
        <p>📞 +40 732 591 355</p>
        <p>📧 contact@apexroof.com</p>
        <p>📍 Romania</p>
      </div>
    </div>

    <div class="right">
      <form id="contactForm">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Phone Number" required>
        <textarea placeholder="Your Message"></textarea>
        <button type="submit">SEND MESSAGE →</button>
      </form>
    </div>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
